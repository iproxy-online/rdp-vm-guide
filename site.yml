---
# Multi-user xRDP on Ubuntu 26.04, plain RDP over the internet.
# Standalone — no external roles, no collections beyond community.general
# (shipped with the apt `ansible` package).
#
# Run via setup-and-run.sh, or directly:
#   sudo ansible-playbook -i 'localhost,' -c local site.yml \
#     -e rdp_port=33890 \
#     -e ufw_allow_from=any \
#     -e '{"xrdp_users":["alice","bob"]}'

- name: xRDP multi-user setup
  hosts: all
  become: true

  vars:
    rdp_port: 33890
    ufw_allow_from: any
    xrdp_users: []

  pre_tasks:
    - name: Sanity-check the OS
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version == "26.04"
        fail_msg: "This playbook targets Ubuntu 26.04 only (got {{ ansible_distribution }} {{ ansible_distribution_version }})."

    - name: Sanity-check inputs
      ansible.builtin.assert:
        that:
          - rdp_port | int >= 1024
          - rdp_port | int <= 65535
          - xrdp_users | length > 0
        fail_msg: "Need rdp_port in 1024-65535 and at least one entry in xrdp_users."

  tasks:
    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install xRDP, XFCE, fail2ban, ufw
      ansible.builtin.apt:
        name:
          - xfce4
          - xfce4-goodies
          - xrdp
          - xorgxrdp
          - dbus-x11
          - xubuntu-wallpapers
          - fail2ban
          - ufw
        state: present
        install_recommends: false

    - name: Add xrdp service user to ssl-cert (so it can read its TLS key)
      ansible.builtin.user:
        name: xrdp
        groups: ssl-cert
        append: true
      notify: Restart xrdp

    - name: Bind xrdp to the chosen port
      community.general.ini_file:
        path: /etc/xrdp/xrdp.ini
        section: Globals
        option: port
        value: "tcp://0.0.0.0:{{ rdp_port }}"
        no_extra_spaces: true
        owner: root
        group: root
        mode: "0644"
      notify: Restart xrdp

    - name: Tune sesman.ini (persistent multi-user sessions)
      community.general.ini_file:
        path: /etc/xrdp/sesman.ini
        section: Sessions
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
        owner: root
        group: root
        mode: "0644"
      loop:
        - { option: MaxSessions,           value: "50" }
        - { option: KillDisconnected,      value: "false" }
        - { option: DisconnectedTimeLimit, value: "0" }
        - { option: IdleTimeLimit,         value: "0" }
      notify: Restart xrdp

    - name: Create RDP users (password set separately — see setup-and-run.sh output)
      ansible.builtin.user:
        name: "{{ item }}"
        shell: /bin/bash
        groups: ssl-cert
        append: true
        create_home: true
        state: present
      loop: "{{ xrdp_users }}"

    - name: Drop XFCE .xsessionrc for each user
      ansible.builtin.copy:
        dest: "/home/{{ item }}/.xsessionrc"
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
        content: |
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          exec startxfce4
      loop: "{{ xrdp_users }}"

    - name: Enable systemd linger (sessions survive disconnect)
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ item }}"
        creates: "/var/lib/systemd/linger/{{ item }}"
      loop: "{{ xrdp_users }}"

    - name: UFW — allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        comment: SSH

    - name: UFW — allow xRDP
      community.general.ufw:
        rule: allow
        port: "{{ rdp_port }}"
        proto: tcp
        from_ip: "{{ ufw_allow_from }}"
        comment: xRDP

    - name: UFW — enable with default deny
      community.general.ufw:
        state: enabled
        policy: deny

    - name: fail2ban — install xrdp filter
      ansible.builtin.copy:
        dest: /etc/fail2ban/filter.d/xrdp.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Definition]
          failregex = ^.*\[ERROR\] .*authentication failed.*from <HOST>.*$
                      ^.*\[INFO \] .*login failed for user .* from <HOST>.*$
                      ^.*\[ERROR\] .*scp_v0s_accept: not pwd.*$
          ignoreregex =
      notify: Restart fail2ban

    - name: fail2ban — install xrdp jail
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/xrdp.local
        owner: root
        group: root
        mode: "0644"
        content: |
          [xrdp]
          enabled  = true
          port     = {{ rdp_port }}
          filter   = xrdp
          logpath  = /var/log/xrdp-sesman.log
          maxretry = 5
          findtime = 10m
          bantime  = 1h
      notify: Restart fail2ban

    - name: Ensure xrdp log exists so fail2ban can attach to it
      ansible.builtin.file:
        path: /var/log/xrdp-sesman.log
        state: touch
        owner: root
        group: root
        mode: "0640"
      changed_when: false

    - name: Enable and start xrdp
      ansible.builtin.systemd:
        name: xrdp
        enabled: true
        state: started

    - name: Enable and start fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

  handlers:
    - name: Restart xrdp
      ansible.builtin.systemd:
        name: xrdp
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
