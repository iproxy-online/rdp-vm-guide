#cloud-config
# =====================================================================
#  xRDP multi-user — one-paste install for a fresh Ubuntu 26.04 VM.
#
#  HOW TO USE:
#    1. Edit the block marked "EDIT HERE" below (users/passwords/port).
#    2. Paste this WHOLE FILE into your cloud provider's
#       "User Data" / "Cloud Config" field when creating the VM.
#    3. Pick Ubuntu 26.04 as the image. Boot. Wait ~5 minutes.
#    4. Connect with any RDP client to <VM-public-IP>:<rdp_port>.
# =====================================================================

write_files:

  - path: /opt/xrdp-multiuser/vars.yml
    permissions: '0600'
    owner: root:root
    content: |
      # >>>>>>>>>>>>>>>>>>>>>>> EDIT HERE >>>>>>>>>>>>>>>>>>>>>>>
      rdp_port: 3389
      ufw_allow_from: any            # or a CIDR like 203.0.113.0/24
      xrdp_users:
        # `admin: true` = user gets sudo (runs apt update etc. from
        # a terminal inside their RDP session). Give this to one
        # account only, and pick a strong password for it.
        - { name: alice, password: "ChangeMe-Alice-2026", admin: true }
        - { name: bob,   password: "ChangeMe-Bob-2026"   }
      # <<<<<<<<<<<<<<<<<<<<<<< END EDIT  <<<<<<<<<<<<<<<<<<<<<<<

  - path: /opt/xrdp-multiuser/site.yml
    permissions: '0644'
    owner: root:root
    content: |
      ---
      - name: xRDP multi-user setup
        hosts: all
        become: true

        vars:
          rdp_port: 3389
          ufw_allow_from: any
          xrdp_users: []
          install_antidetect: true
          # Pinned versions — bump when vendors release. AdsPower in particular
          # versions its download URLs; an unbumped version still works but the
          # in-app updater will pull the latest after first launch.
          adspower_version: "8.4.3"
          camoufox_release_tag: "v150.0.2-beta.25"
          camoufox_zip_name: "camoufox-150.0.2-alpha.26-lin.x86_64.zip"

        pre_tasks:
          - name: Sanity-check the OS
            ansible.builtin.assert:
              that:
                - ansible_facts['distribution'] == "Ubuntu"
                - ansible_facts['distribution_version'] is version('24.04', '>=')
              fail_msg: "This playbook targets Ubuntu 24.04 or newer (got {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }})."

          - name: Sanity-check inputs
            ansible.builtin.assert:
              that:
                - rdp_port | int >= 1024
                - rdp_port | int <= 65535
                - xrdp_users | length > 0
              fail_msg: "Need rdp_port in 1024-65535 and at least one entry in xrdp_users."

        tasks:
          - name: Normalize xrdp_users to a list of dicts
            ansible.builtin.set_fact:
              _xrdp_users: >-
                {{
                  xrdp_users
                  | map('community.general.dict_kv', 'name')
                  | list
                  if (xrdp_users | first) is string
                  else xrdp_users
                }}

          - name: Refresh apt cache
            ansible.builtin.apt:
              update_cache: true
              cache_valid_time: 3600

          # Mozilla's apt repo + pinning is needed to get a real .deb firefox
          # on Ubuntu 22.04+; without this, `apt install firefox` pulls a
          # transitional package that installs the snap.
          - name: Mozilla apt — keyring dir
            ansible.builtin.file:
              path: /etc/apt/keyrings
              state: directory
              owner: root
              group: root
              mode: "0755"

          - name: Mozilla apt — signing key
            ansible.builtin.get_url:
              url: https://packages.mozilla.org/apt/repo-signing-key.gpg
              dest: /etc/apt/keyrings/packages.mozilla.org.asc
              owner: root
              group: root
              mode: "0644"

          - name: Mozilla apt — repo
            ansible.builtin.copy:
              dest: /etc/apt/sources.list.d/mozilla.list
              owner: root
              group: root
              mode: "0644"
              content: |
                deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main

          - name: Mozilla apt — pin over Ubuntu snap stub
            ansible.builtin.copy:
              dest: /etc/apt/preferences.d/mozilla
              owner: root
              group: root
              mode: "0644"
              content: |
                Package: *
                Pin: origin packages.mozilla.org
                Pin-Priority: 1000

          - name: Refresh apt cache (after Mozilla repo)
            ansible.builtin.apt:
              update_cache: true

          - name: Install xRDP, XFCE, fail2ban, ufw, firefox
            ansible.builtin.apt:
              name:
                - xfce4
                - xfce4-goodies
                - xrdp
                - xorgxrdp
                - dbus-x11
                - xubuntu-wallpapers
                - fail2ban
                - ufw
                - python3-passlib
                - firefox
              state: present
              install_recommends: false

          - name: Add xrdp service user to ssl-cert
            ansible.builtin.user:
              name: xrdp
              groups: ssl-cert
              append: true
            notify: Restart xrdp

          - name: Bind xrdp to the chosen port
            community.general.ini_file:
              path: /etc/xrdp/xrdp.ini
              section: Globals
              option: port
              value: "tcp://0.0.0.0:{{ rdp_port }}"
              no_extra_spaces: true
              owner: root
              group: root
              mode: "0644"
            notify: Restart xrdp

          - name: Tune sesman.ini (persistent multi-user sessions)
            community.general.ini_file:
              path: /etc/xrdp/sesman.ini
              section: Sessions
              option: "{{ item.option }}"
              value: "{{ item.value }}"
              no_extra_spaces: true
              owner: root
              group: root
              mode: "0644"
            loop:
              - { option: MaxSessions,           value: "50" }
              - { option: KillDisconnected,      value: "false" }
              - { option: DisconnectedTimeLimit, value: "0" }
              - { option: IdleTimeLimit,         value: "0" }
            notify: Restart xrdp

          - name: Create RDP users
            ansible.builtin.user:
              name: "{{ item.name }}"
              password: "{{ (item.password | password_hash('sha512')) if item.password is defined else omit }}"
              update_password: on_create
              shell: /bin/bash
              groups: "{{ ['ssl-cert', 'sudo'] if (item.admin | default(false)) else ['ssl-cert'] }}"
              append: true
              create_home: true
              state: present
            loop: "{{ _xrdp_users }}"
            loop_control:
              label: "{{ item.name }}{{ ' (admin)' if (item.admin | default(false)) else '' }}"
            no_log: "{{ item.password is defined }}"

          - name: Drop XFCE .xsessionrc for each user
            ansible.builtin.copy:
              dest: "/home/{{ item.name }}/.xsessionrc"
              owner: "{{ item.name }}"
              group: "{{ item.name }}"
              mode: "0644"
              content: |
                export XDG_SESSION_TYPE=x11
                export XDG_CURRENT_DESKTOP=XFCE
                exec startxfce4
            loop: "{{ _xrdp_users }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Enable systemd linger (sessions survive disconnect)
            ansible.builtin.command:
              cmd: "loginctl enable-linger {{ item.name }}"
              creates: "/var/lib/systemd/linger/{{ item.name }}"
            loop: "{{ _xrdp_users }}"
            loop_control:
              label: "{{ item.name }}"

          - name: UFW — allow SSH
            community.general.ufw:
              rule: allow
              port: "22"
              proto: tcp
              comment: SSH

          - name: UFW — allow xRDP
            community.general.ufw:
              rule: allow
              port: "{{ rdp_port }}"
              proto: tcp
              from_ip: "{{ ufw_allow_from }}"
              comment: xRDP

          - name: UFW — enable with default deny
            community.general.ufw:
              state: enabled
              policy: deny

          - name: fail2ban — install xrdp filter
            ansible.builtin.copy:
              dest: /etc/fail2ban/filter.d/xrdp.conf
              owner: root
              group: root
              mode: "0644"
              content: |
                # xrdp writes auth events to the systemd journal via
                # xrdp-sesexec (a child of xrdp-sesman.service). The line we
                # care about looks like:
                #   [INFO ] AUTHFAIL: user=alice ip=1.2.3.4 time=1779748324
                [Definition]
                failregex = ^.*\[INFO \] AUTHFAIL: user=\S+ ip=<HOST> time=\d+.*$
                ignoreregex =
            notify: Restart fail2ban

          - name: fail2ban — install xrdp jail
            ansible.builtin.copy:
              dest: /etc/fail2ban/jail.d/xrdp.local
              owner: root
              group: root
              mode: "0644"
              content: |
                [xrdp]
                enabled      = true
                port         = {{ rdp_port }}
                filter       = xrdp
                backend      = systemd
                journalmatch = _SYSTEMD_UNIT=xrdp-sesman.service
                maxretry     = 5
                findtime     = 10m
                bantime      = 1h
            notify: Restart fail2ban

          - name: Enable and start xrdp
            ansible.builtin.systemd:
              name: xrdp
              enabled: true
              state: started

          - name: Enable and start fail2ban
            ansible.builtin.systemd:
              name: fail2ban
              enabled: true
              state: started

          # ---------- antidetect browsers ----------
          # Six popular anti-detect browsers for managing multiple
          # identities (typically used with residential proxies). They share
          # the same Chromium/Electron dependencies, so install those once.
          # /var/tmp is used as staging because /tmp is tmpfs on Ubuntu cloud
          # images and only ~800MB — not enough for the full download set.

          - name: antidetect — install shared deps and unpackers
            ansible.builtin.apt:
              name:
                - cpio
                - rpm2cpio
                - unzip
                - libnss3
                - libgbm1
                - libgtk-3-0
                - libasound2t64
                - libxss1
                - libxshmfence1
                - libxtst6
                - libsecret-1-0
                - libnotify4
                - libdrm2
                - libxcb-dri3-0
              state: present
              install_recommends: false
            when: install_antidetect | bool

          - name: antidetect — staging dir
            ansible.builtin.file:
              path: /var/tmp/antidl
              state: directory
              mode: "0755"
            when: install_antidetect | bool

          # AdsPower — .deb from vendor CDN. Idempotent via apt's own dedup.
          - name: antidetect — AdsPower download
            ansible.builtin.get_url:
              url: "https://version.adspower.net/software/linux-x64-global/{{ adspower_version }}/AdsPower-Global-{{ adspower_version }}-x64.deb"
              dest: "/var/tmp/antidl/adspower.deb"
              mode: "0644"
            when: install_antidetect | bool
            register: adspower_dl

          - name: antidetect — AdsPower install
            ansible.builtin.apt:
              deb: /var/tmp/antidl/adspower.deb
            when: install_antidetect | bool and adspower_dl is succeeded

          # Multilogin X (mlx agent). Headless browser-launching daemon; UI
          # is at app.multilogin.com which talks to the local agent.
          - name: antidetect — Multilogin X download
            ansible.builtin.get_url:
              url: "https://mlxdists.s3.eu-west-3.amazonaws.com/mlx/latest/multiloginx-amd64.deb"
              dest: "/var/tmp/antidl/multiloginx.deb"
              mode: "0644"
            when: install_antidetect | bool
            register: mlx_dl

          - name: antidetect — Multilogin X install
            ansible.builtin.apt:
              deb: /var/tmp/antidl/multiloginx.deb
            when: install_antidetect | bool and mlx_dl is succeeded

          # Dolphin Anty — vendor only publishes .rpm. alien chokes on its
          # zstd-compressed payload on Ubuntu 26.04, so extract with
          # rpm2cpio/cpio and relocate the payload manually.
          - name: antidetect — Dolphin Anty download
            ansible.builtin.get_url:
              url: "https://dolphin-anty-cdn.com/anty-app/dolphin-anty-linux-x86_64-latest.rpm"
              dest: "/var/tmp/antidl/dolphin.rpm"
              mode: "0644"
            when: install_antidetect | bool
            register: dolphin_dl

          - name: antidetect — Dolphin Anty unpack
            ansible.builtin.shell:
              cmd: |
                set -e
                rm -rf /var/tmp/antidl/dolphin-extract
                mkdir -p /var/tmp/antidl/dolphin-extract
                cd /var/tmp/antidl/dolphin-extract
                rpm2cpio /var/tmp/antidl/dolphin.rpm | cpio -idm
                rm -rf "/opt/Dolphin-Anty"
                mv "opt/Dolphin Anty" /opt/Dolphin-Anty
                install -m 644 usr/share/applications/dolphin_anty.desktop /usr/share/applications/dolphin_anty.desktop
                sed -i 's|/opt/Dolphin Anty/dolphin_anty|/opt/Dolphin-Anty/dolphin_anty|g; s|^Exec=.*|Exec=/opt/Dolphin-Anty/dolphin_anty --no-sandbox %U|' /usr/share/applications/dolphin_anty.desktop
                ln -sf /opt/Dolphin-Anty/dolphin_anty /usr/local/bin/dolphin-anty
                chmod 4755 /opt/Dolphin-Anty/chrome-sandbox || true
                rm -rf /var/tmp/antidl/dolphin-extract
              creates: /opt/Dolphin-Anty/dolphin_anty
            when: install_antidetect | bool and dolphin_dl is succeeded

          # GoLogin — single ELF binary inside a tar.
          - name: antidetect — GoLogin target dir
            ansible.builtin.file:
              path: /opt/antidetect/gologin
              state: directory
              mode: "0755"
            when: install_antidetect | bool

          - name: antidetect — GoLogin download + extract
            ansible.builtin.unarchive:
              src: "https://dl.gologin.com/gologin.tar"
              dest: /opt/antidetect/gologin
              remote_src: true
              creates: /opt/antidetect/gologin/Gologin-4.2.9
            when: install_antidetect | bool

          - name: antidetect — GoLogin launcher + desktop entry
            ansible.builtin.copy:
              dest: /usr/share/applications/gologin.desktop
              owner: root
              group: root
              mode: "0644"
              content: |
                [Desktop Entry]
                Type=Application
                Name=GoLogin
                Comment=GoLogin antidetect browser
                Exec=/bin/sh -c 'chmod +x /opt/antidetect/gologin/Gologin-* && exec /opt/antidetect/gologin/Gologin-*'
                Icon=web-browser
                Terminal=false
                Categories=Network;WebBrowser;
            when: install_antidetect | bool

          # Octo Browser — vendor ships a tarred ELF (file ext .AppImage but
          # not actually an AppImage; just a static-linked binary).
          - name: antidetect — Octo Browser target dir
            ansible.builtin.file:
              path: /opt/antidetect/octobrowser
              state: directory
              mode: "0755"
            when: install_antidetect | bool

          - name: antidetect — Octo Browser download + extract
            ansible.builtin.unarchive:
              src: "https://binaries.octobrowser.net/releases/installer/OctoBrowser.linux.tar.gz"
              dest: /opt/antidetect/octobrowser
              remote_src: true
              creates: /opt/antidetect/octobrowser/OctoBrowser.AppImage
            when: install_antidetect | bool

          - name: antidetect — Octo Browser launcher
            ansible.builtin.file:
              path: /opt/antidetect/octobrowser/OctoBrowser.AppImage
              mode: "0755"
            when: install_antidetect | bool

          - name: antidetect — Octo Browser desktop entry
            ansible.builtin.copy:
              dest: /usr/share/applications/octobrowser.desktop
              owner: root
              group: root
              mode: "0644"
              content: |
                [Desktop Entry]
                Type=Application
                Name=Octo Browser
                Comment=Octo antidetect browser
                Exec=/opt/antidetect/octobrowser/OctoBrowser.AppImage
                Icon=web-browser
                Terminal=false
                Categories=Network;WebBrowser;
            when: install_antidetect | bool

          # Camoufox — open-source Firefox-based antidetect browser. No login
          # required. Zip from a GitHub release.
          - name: antidetect — Camoufox target dir
            ansible.builtin.file:
              path: /opt/antidetect/camoufox
              state: directory
              mode: "0755"
            when: install_antidetect | bool

          - name: antidetect — Camoufox download + extract
            ansible.builtin.unarchive:
              src: "https://github.com/daijro/camoufox/releases/download/{{ camoufox_release_tag }}/{{ camoufox_zip_name }}"
              dest: /opt/antidetect/camoufox
              remote_src: true
              creates: /opt/antidetect/camoufox/camoufox
            when: install_antidetect | bool

          - name: antidetect — Camoufox launcher + desktop entry
            ansible.builtin.copy:
              dest: /usr/share/applications/camoufox.desktop
              owner: root
              group: root
              mode: "0644"
              content: |
                [Desktop Entry]
                Type=Application
                Name=Camoufox
                Comment=Camoufox (open-source Firefox antidetect fork)
                Exec=/opt/antidetect/camoufox/camoufox
                Icon=firefox
                Terminal=false
                Categories=Network;WebBrowser;
            when: install_antidetect | bool

          # Vendor .desktop files for AdsPower (Utility;) and Multilogin X
          # (bare WebBrowser) don't land in XFCE's Internet menu — fix them
          # to the canonical Network;WebBrowser; pair.
          - name: antidetect — fix AdsPower / Multilogin X menu categories
            ansible.builtin.lineinfile:
              path: "{{ item }}"
              regexp: '^Categories='
              line: 'Categories=Network;WebBrowser;'
            loop:
              - /usr/share/applications/adspower_global.desktop
              - /usr/share/applications/mlx.desktop
            when: install_antidetect | bool

          - name: antidetect — refresh desktop database
            ansible.builtin.command:
              cmd: update-desktop-database -q
            changed_when: false
            when: install_antidetect | bool

        handlers:
          - name: Restart xrdp
            ansible.builtin.systemd:
              name: xrdp
              state: restarted

          - name: Restart fail2ban
            ansible.builtin.systemd:
              name: fail2ban
              state: restarted

package_update: true
package_upgrade: false
packages:
  - ansible

runcmd:
  - [ ansible-playbook, -i, "localhost,", -c, local,
      /opt/xrdp-multiuser/site.yml,
      -e, "@/opt/xrdp-multiuser/vars.yml" ]
